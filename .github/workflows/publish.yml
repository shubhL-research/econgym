# Publishes econgym to PyPI when a GitHub Release is published.
#
# This uses PyPI Trusted Publishing (OIDC), so there is NO API token to store.
# One-time setup on your side (see README "Publishing to PyPI"):
#   1. Create a PyPI account and a project named "econgym".
#   2. On PyPI, add a Trusted Publisher for this repo:
#        Owner: shubhL-research   Repository: econgym
#        Workflow: publish.yml
#   3. Then draft a GitHub Release (tag e.g. v0.2.0) and publish it; this runs.
name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC token for PyPI Trusted Publishing (no stored secret)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build distributions
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
